<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finai — Indian Financial Intelligence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --dark: #0a1628; --card: #111827; --accent: #00d4aa;
    --gold: #f5c842; --red: #ff4d6a; --blue: #3b82f6;
    --text: #e2e8f0; --muted: #64748b; --border: #1e2d45;
  }
  body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100; }

  /* HEADER */
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 22px; font-weight: 800; color: white; }
  .logo span { color: var(--accent); }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--accent); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TICKER */
  .ticker { background: var(--card); border-bottom: 1px solid var(--border); overflow: hidden; padding: 8px 0; font-size: 12px; color: var(--accent); font-family: monospace; white-space: nowrap; }
  .ticker-inner { display: inline-block; animation: ticker 30s linear infinite; }
  @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* LAYOUT */
.container{
display:grid;
grid-template-columns:300px 1fr;
height:calc(100vh - 90px);
overflow:hidden;
}

  /* SIDEBAR */
  .sidebar { background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
  .sidebar h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .lang-select { width: 100%; background: var(--dark); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; margin-bottom: 16px; cursor: pointer; }
  .stock-card { background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s; }
  .stock-card:hover { border-color: var(--accent); }
  .stock-card .name { font-size: 12px; font-weight: 700; color: white; }
  .stock-card .price { font-size: 13px; color: var(--text); font-family: monospace; margin-top: 2px; }
  .stock-card .change { font-size: 11px; margin-top: 2px; }
  .up { color: var(--accent); } .down { color: var(--red); }
 .content{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
}

.chat-wrap{
  display:flex;
  flex-direction:column;
  height:100%;
}

.messages{
  flex:1;
  overflow-y:auto;
}

  /* MAIN */
.main{
display:flex;
flex-direction:column;
height:100%;
overflow:hidden;
background:#041225;
   }
  /* TABS */
  .tabs { display: flex; gap: 4px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
  .tab { padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.2s; }
  .tab.active { background: var(--accent); color: var(--dark); border-color: var(--accent); }

  /* CONTENT */
.content{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
padding:0;
               }

  /* CHAT */
  .chat-wrap{
display:flex;
flex-direction:column;
height:100%;
width:100%;
  }
  .messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
  }
  .msg { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .ai-avatar { background: linear-gradient(135deg, var(--accent), var(--blue)); }
  .user-avatar { background: var(--border); }
  .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
  .ai-bubble { background: var(--card); border: 1px solid var(--border); border-radius: 12px 12px 12px 2px; }
  .user-bubble { background: linear-gradient(135deg,rgba(0,212,170,0.15),rgba(59,130,246,0.15)); border: 1px solid rgba(0,212,170,0.3); border-radius: 12px 12px 2px 12px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
 .input-row{
display:flex;
align-items:center;
gap:12px;
width:100%;
padding:16px;
margin-top:auto;
background:#101827;
border-top:1px solid #22324d;
border-radius:18px;
}

.chat-input{
flex:1;
background:#081225;
border:2px solid #00d4aa;
border-radius:16px;
padding:16px;
color:white;
font-size:15px;
outline:none;
}

.chat-input::placeholder{
color:#94a3b8;
}

.send-btn,.voice-btn{
border:none;
border-radius:14px;
padding:14px 18px;
cursor:pointer;
font-weight:700;
font-size:14px;
background:linear-gradient(135deg,#00d4aa,#3b82f6);
color:white;
                }
 
</style>
</head>
<body>

<header>
  <div class="logo">Fin<span>AI</span> 🇮🇳</div>
  <div style="font-size:11px;color:var(--muted);">Indian Financial Intelligence Platform</div>
  <div class="live-badge"><span class="dot"></span> LIVE</div>
</header>

<div class="ticker">
  <div class="ticker-inner" id="ticker">Loading market data...</div>
</div>

<div class="container">
  <div class="sidebar">
    <h3>Language / भाषा</h3>
    <select class="lang-select">
      <option value="english">🇬🇧 English</option>
      <option value="hindi">🇮🇳 हिंदी (Hindi)</option>
      <option value="tamil">🇮🇳 தமிழ் (Tamil)</option>
      <option value="telugu">🇮🇳 తెలుగు (Telugu)</option>
    </select>

    <h3>NSE Stocks</h3>

    <div class="stock-card">
  <div class="name">RELIANCE</div>
  <div class="price" id="reliancePrice">Loading...</div>
</div>

<div class="stock-card">
  <div class="name">TCS</div>
  <div class="price" id="tcsPrice">Loading...</div>
</div>

<div class="stock-card">
  <div class="name">INFOSYS</div>
  <div class="price" id="infosysPrice">Loading...</div>
</div>
</div>

  <div class="main">
    <div class="tabs">
      <button class="tab active">💬 AI Chat</button>
      <button class="tab">📈 Predict</button>
      <button class="tab">₿ Crypto</button>
      <button class="tab">💰 SIP</button>
      <button class="tab">😊 Sentiment</button>
      <button class="tab">🌐 Languages</button>
    </div>

    <div class="content">
      <div class="chat-wrap">
        <div class="messages" id="messages" >
          <div class="msg">
            <div class="avatar ai-avatar">₹</div>
            <div class="bubble ai-bubble">
Namaste! 🙏 I am FinAI — your intelligent financial companion for Indian markets.
            </div>
          </div>
        </div>
       <div class="input-row">

<input
class="chat-input"
id="chatInput"
placeholder="Ask anything about Indian markets..."
onkeydown="if(event.key==='Enter')sendMsg()"
/>

<button class="voice-btn" onclick="startVoice()">🎤</button>

<button class="send-btn" onclick="sendMsg()">Send</button>

       </div>
      </div>
    </div>

  </div>
</div>

<script>

console.log("FinAI Loaded");

async function loadMarketData() {

  try {

    const nifty = await fetch(
      "https://query1.finance.yahoo.com/v8/finance/chart/%5ENSEI"
    ).then(r => r.json());

    const sensex = await fetch(
      "https://query1.finance.yahoo.com/v8/finance/chart/%5EBSESN"
    ).then(r => r.json());

    const btc = await fetch(
      "https://api.coindesk.com/v1/bpi/currentprice/INR.json"
    ).then(r => r.json());

    const niftyPrice =
      nifty.chart.result[0].meta.regularMarketPrice;

    const sensexPrice =
      sensex.chart.result[0].meta.regularMarketPrice;

    const btcPrice =
      btc.bpi.INR.rate;

    document.getElementById("ticker").textContent =
      `NIFTY 50: ${niftyPrice} • SENSEX: ${sensexPrice} • BTC/INR: ₹${btcPrice}`;

  } catch (err) {

    document.getElementById("ticker").textContent =
      "Live market data unavailable";

    console.error(err);
  }
}

async function loadStocks() {

  const stocks = {
    reliance: "RELIANCE.NS",
    tcs: "TCS.NS",
    infosys: "INFY.NS"
  };

  for (const key in stocks) {

    try {

      const res = await fetch(
        `https://query1.finance.yahoo.com/v8/finance/chart/${stocks[key]}`
      );

      const data = await res.json();

      const price =
        data.chart.result[0].meta.regularMarketPrice;

      document.getElementById(
        key + "Price"
      ).textContent = "₹" + price;

    } catch (e) {

      console.log(e);

    }
  }
}

loadMarketData();
loadStocks();

setInterval(loadMarketData, 30000);
setInterval(loadStocks, 30000);
function startVoice(){

const recognition =
new(window.SpeechRecognition||
window.webkitSpeechRecognition)();

recognition.lang="en-IN";

recognition.onresult=function(event){
document.getElementById("chatInput").value=
event.results[0][0].transcript;
};

recognition.start();
 }
 const tabs=document.querySelectorAll(".tab");

tabs.forEach(tab=>{

tab.addEventListener("click",()=>{

tabs.forEach(t=>t.classList.remove("active"));

tab.classList.add("active");

});

});
 function sendMsg(){

const input=document.getElementById("chatInput");

const text=input.value.trim();

if(!text)return;

const messages=document.getElementById("messages");

messages.innerHTML+=`
<div class="msg user">
<div class="avatar user-avatar">🧑</div>
<div class="bubble user-bubble">${text}</div>
</div>
`;

input.value="";

messages.scrollTop=messages.scrollHeight;

setTimeout(()=>{

messages.innerHTML+=`
<div class="msg">
<div class="avatar ai-avatar">₹</div>
<div class="bubble ai-bubble">
FinAI received: "${text}"
</div>
</div>
`;

messages.scrollTop=messages.scrollHeight;

},600);

 }

</script>

</body>
</html>
