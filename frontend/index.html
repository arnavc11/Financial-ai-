<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin — Indian Financial Intelligence</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --dark: #0a1628; --card: #111827; --accent: #00d4aa;
    --gold: #f5c842; --red: #ff4d6a; --blue: #3b82f6;
    --text: #e2e8f0; --muted: #64748b; --border: #1e2d45;
  }
  body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

  /* HEADER */
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 22px; font-weight: 800; color: white; }
  .logo span { color: var(--accent); }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--accent); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* TICKER */
  .ticker { background: var(--card); border-bottom: 1px solid var(--border); overflow: hidden; padding: 8px 0; font-size: 12px; color: var(--accent); font-family: monospace; white-space: nowrap; }
  .ticker-inner { display: inline-block; animation: ticker 30s linear infinite; }
  @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* LAYOUT */
  .container { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 90px); }

  /* SIDEBAR */
  .sidebar { background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
  .sidebar h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .lang-select { width: 100%; background: var(--dark); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; margin-bottom: 16px; cursor: pointer; }
  .stock-card { background: var(--dark); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s; }
  .stock-card:hover { border-color: var(--accent); }
  .stock-card .name { font-size: 12px; font-weight: 700; color: white; }
  .stock-card .price { font-size: 13px; color: var(--text); font-family: monospace; margin-top: 2px; }
  .stock-card .change { font-size: 11px; margin-top: 2px; }
  .up { color: var(--accent); } .down { color: var(--red); }

  /* MAIN */
  .main { display: flex; flex-direction: column; overflow: hidden; }

  /* TABS */
  .tabs { display: flex; gap: 4px; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
  .tab { padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.2s; }
  .tab.active { background: var(--accent); color: var(--dark); border-color: var(--accent); }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 16px; }

  /* CHAT */
  .chat-wrap { display: flex; flex-direction: column; height: 100%; }
  .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-bottom: 8px; }
  .msg { display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .ai-avatar { background: linear-gradient(135deg, var(--accent), var(--blue)); }
  .user-avatar { background: var(--border); }
  .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
  .ai-bubble { background: var(--card); border: 1px solid var(--border); border-radius: 12px 12px 12px 2px; }
  .user-bubble { background: linear-gradient(135deg,rgba(0,212,170,0.15),rgba(59,130,246,0.15)); border: 1px solid rgba(0,212,170,0.3); border-radius: 12px 12px 2px 12px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">Fin<span>AI</span> 🇮🇳</div>
  <div style="font-size:11px;color:var(--muted);">Indian Financial Intelligence Platform</div>
  <div class="live-badge"><span class="dot"></span> LIVE</div>
</header>

<div class="ticker">
  <div class="ticker-inner" id="ticker">Loading market data...</div>
</div>

<div class="container">
  <div class="sidebar">
    <h3>Language / भाषा</h3>
    <select class="lang-select">
      <option value="english">🇬🇧 English</option>
      <option value="hindi">🇮🇳 हिंदी (Hindi)</option>
      <option value="tamil">🇮🇳 தமிழ் (Tamil)</option>
      <option value="telugu">🇮🇳 తెలుగు (Telugu)</option>
    </select>

    <h3>NSE Stocks</h3>

    <div class="stock-card">
      <div class="name">RELIANCE</div>
      <div class="price">₹2,847.30</div>
      <div class="change up">+1.24%</div>
    </div>

    <div class="stock-card">
      <div class="name">TCS</div>
      <div class="price">₹3,612.15</div>
      <div class="change up">+0.87%</div>
    </div>

    <div class="stock-card">
      <div class="name">INFOSYS</div>
      <div class="price">₹1,421.70</div>
      <div class="change up">+2.11%</div>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab active">💬 AI Chat</button>
      <button class="tab">📈 Predict</button>
      <button class="tab">₿ Crypto</button>
      <button class="tab">💰 SIP</button>
      <button class="tab">😊 Sentiment</button>
      <button class="tab">🌐 Languages</button>
    </div>

    <div class="content">
      <div class="chat-wrap">
        <div class="messages">
          <div class="msg">
            <div class="avatar ai-avatar">₹</div>
            <div class="bubble ai-bubble">
Namaste! 🙏 I am FinAI — your intelligent financial companion for Indian markets.
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
console.log("FinAI Loaded");

const tickerData =
'NIFTY 50: 22,147 ▲0.84% • SENSEX: 73,088 ▲0.76% • BTC/INR: ₹74.2L ▲3.45%';

document.getElementById('ticker').textContent =
tickerData + " • " + tickerData;
</script>

</body>
</html>
